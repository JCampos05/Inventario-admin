<div class="stat-card">
  <div class="stat-card__icono stat-card__icono--{{ tono }}">
    <app-icon [name]="icono" weight="fill" [size]="22"></app-icon>
  </div>
  <div class="stat-card__contenido">
    <span class="stat-card__valor heading--display">{{ valor }}</span>
    <span class="stat-card__etiqueta text-body">{{ etiqueta }}</span>
  </div>
</div>
